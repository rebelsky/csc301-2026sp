# Jekyll Site settings

# Course title
title: CSC 301-01 (Spring 2026)

# baseurl is used for redirects on the same server.
# url is the full path name
baseurl: /Courses/CSC301/2026Sp
url: https://rebelsky.cs.grinnell.edu/Courses/CSC151/2026Sp/

# Are we online?  If not, we're in person.  (Some of the lab instructions are
# affected by this choice.)
online: false

# Are we in a term (seven weeks)?  If not, we're in a semester
term: false

# Set the theme color. Options are blue, green, red, orange, purple, and gray
color: blue 

instructor: Samuel A. Rebelsky

instructor_title: Professor Rebelsky

instructor_homepage: https://rebelsky.cs.grinnell.edu

instructor_email: rebelsky@grinnell.edu

meeting_times: |
  MWF 10:00&ndash;11:20 AM CT in HSSC A1241

evening_due_time: 10:00 PM

office_hours:
  - M&ndash;F 8:00&ndash;9:00 AM CT in Science 2806

mentors: 
  - SJ (Section 1)
  - Garikai (Section 2)

mentor_sessions:
  - Mondays, 7:00&ndash;8:00 PM CT
  - Thursdays, 7:00&ndash;8:00 PM CT

all_work_deadline:  5:00 PM on Friday, 15 May 2026
# final_exam_time: TBD

copyright: |
  Copyright &copy; Samuel A. Rebelsky

copyright_message: |
  Unless specified otherwise elsewhere on this page, this work is
  licensed under CC BY 4.0. To view a copy of this license, visit https://creativecommons.org/licenses/by/4.0/.

# Be picky about front-matter
strict_front_matter: true

# Set up collections for course content
collections:
  admin:
    output: false

  eboards:
    output: true
    permalink: /eboards/:path.html

  handouts:
    output: true
    permalink: /handouts/:path.html

  links:
    output: true
    permalink: /links:path.html

  sandbox:
    output: true
    permalink: /sandbox/:path.html

# Default layouts
defaults:
  - scope:
      path: ""
    values:
      layout: default
  
  - scope:
      path: ""
      type: readings
    values:
      link: true
      layout: assigned

  - scope:
      path: ""
      type: sandbox
    values:
      link: true
      layout: assigned

# Build settings
exclude:
  - admin
  - Gemfile
  - Gemfile.lock
  - INSTRUCTOR.md
  - LICENSE
  - Makefile
  - README.md
  - bin
  - tasks
  - vault
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    default_lang: java
    span:
      line_numbers: false
    block:
      line_numbers: false

# Plugin Settings
plugins:
  - jekyll-bootstrap-sass
  - jekyll-include-cache

bootstrap:
  assets: true
